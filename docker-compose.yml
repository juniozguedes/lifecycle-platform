# =============================================================================
# Local Airflow Development Environment
# =============================================================================
# 
# Usage:
#   cp .env.example .env  # Copy and fill in your values
#   docker-compose up -d
# =============================================================================

services:
  postgres:
    image: postgres:16
    container_name: lifecycle-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-airflow_db}
      POSTGRES_USER: ${DB_USER:-airflow_user}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lifecycle_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-airflow_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: lifecycle-redis
    ports:
      - "6379:6379"
    networks:
      - lifecycle_network

  airflow-webserver:
    image: apache/airflow:2.10.0-python3.12
    container_name: lifecycle-airflow-webserver
    hostname: airflow-webserver
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${SECRET_KEY}
      AIRFLOW__WEBSERVER__CSRF_ENABLED: "False"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_WWW_USER_USERNAME: ${ADMIN_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${ADMIN_PASS}
      PYTHONPATH: /opt/airflow
      CLOUDSDK_API_ENDPOINT_OVERRIDES_BIGQUERY: ${BIGQUERY_ENDPOINT}
      CLOUDSDK_API_ENDPOINT_OVERRIDE_BIGQUERY: ${BIGQUERY_ENDPOINT}
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - lifecycle_network

  airflow-scheduler:
    image: apache/airflow:2.10.0-python3.12
    container_name: lifecycle-airflow-scheduler
    hostname: airflow-scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${SECRET_KEY}
      AIRFLOW__WEBSERVER__CSRF_ENABLED: "False"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
      PYTHONPATH: /opt/airflow
      CLOUDSDK_API_ENDPOINT_OVERRIDES_BIGQUERY: ${BIGQUERY_ENDPOINT}
      CLOUDSDK_API_ENDPOINT_OVERRIDE_BIGQUERY: ${BIGQUERY_ENDPOINT}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_logs:/opt/airflow/logs
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - lifecycle_network

  airflow-init:
    image: apache/airflow:2.10.0-python3.12
    container_name: lifecycle-airflow-init
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username ${ADMIN_USER} --password ${ADMIN_PASS} --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${SECRET_KEY}
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - lifecycle_network

networks:
  lifecycle_network:
    driver: bridge

volumes:
  postgres_data:
  airflow_logs: