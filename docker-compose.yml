# =============================================================================
# Local Airflow Development Environment
# =============================================================================
# 
# This docker-compose.yml sets up a local Airflow environment for development
# and testing of the SMS Reactivation DAG.
#
# Usage:
#   cp .env.example .env  # Copy and fill in your values
#   docker-compose up -d
#   # Access Airflow UI at http://localhost:8080
#   # Default credentials: admin/admin
#
# To view logs:
#   docker-compose logs -f airflow-webserver
#   docker-compose logs -f airflow-scheduler
#
# To stop:
#   docker-compose down
# =============================================================================

services:
  # -------------------------------------------------------------------------
  # PostgreSQL - Airflow Metastore
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: lifecycle-postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5
    networks:
      - lifecycle_network

  # -------------------------------------------------------------------------
  # Redis - For CeleryExecutor (optional)
  # -------------------------------------------------------------------------
  redis:
    image: redis:7
    container_name: lifecycle-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - lifecycle_network

  # -------------------------------------------------------------------------
  # Airflow Webserver
  # -------------------------------------------------------------------------
  airflow-webserver:
    image: apache/airflow:2.10.0-python3.12
    container_name: lifecycle-airflow-webserver
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.session"
      AIRFLOW__CORE__SLACK_API_TOKEN: ""
      AIRFLOW_VAR__LIFECYCLE_PROJECT_ID: local-project
      AIRFLOW_VAR__HISTORICAL_AUDIENCE_AVG: "5000"
      # BigQuery emulator configuration
      CLOUDSDK_API_ENDPOINT_OVERRIDES_BIGQUERY: http://host.docker.internal:9060
      PYTHONPATH: "/opt/airflow"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - lifecycle_network

  # -------------------------------------------------------------------------
  # Airflow Scheduler
  # -------------------------------------------------------------------------
  airflow-scheduler:
    image: apache/airflow:2.10.0-python3.12
    container_name: lifecycle-airflow-scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_VAR__LIFECYCLE_PROJECT_ID: local-project
      AIRFLOW_VAR__HISTORICAL_AUDIENCE_AVG: "5000"
      # BigQuery emulator configuration
      CLOUDSDK_API_ENDPOINT_OVERRIDES_BIGQUERY: http://host.docker.internal:9060
      PYTHONPATH: "/opt/airflow"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - lifecycle_network

  # -------------------------------------------------------------------------
  # Airflow Init - Database setup (runs once)
  # -------------------------------------------------------------------------
  airflow-init:
    image: apache/airflow:2.10.0-python3.12
    container_name: lifecycle-airflow-init
    command: version
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - lifecycle_network

networks:
  lifecycle_network:
    driver: bridge

volumes:
  postgres_data:


# =============================================================================
# Notes:
# =============================================================================
#
# 1. Default Airflow credentials: admin / admin (change via AIRFLOW_ADMIN_PASSWORD)
# 2. Webserver runs on http://localhost:8080
# 3. DAGs directory is mounted at /opt/airflow/dags
# 4. Airflow Variables can be set in the UI or via environment:
#    - AIRFLOW_VAR__LIFECYCLE_PROJECT_ID: BigQuery project ID
#    - AIRFLOW_VAR__HISTORICAL_AUDIENCE_AVG: Historical average for anomaly detection
# 5. For local BigQuery emulator, ensure localgcp is running:
#    localgcp up
#
# To add more services (CeleryExecutor, flower, etc.), see:
# https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html
# =============================================================================