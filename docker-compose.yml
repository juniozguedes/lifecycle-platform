# =============================================================================
# Local Airflow Development Environment
# =============================================================================
# 
# Usage:
#   cp .env.example .env  # Copy and fill in your values
#   docker-compose up -d
# =============================================================================

services:
  postgres:
    image: postgres:16
    container_name: lifecycle-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-airflow_db}
      POSTGRES_USER: ${DB_USER:-airflow_user}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lifecycle_network

  redis:
    image: redis:7
    container_name: lifecycle-redis
    ports:
      - "6379:6379"
    networks:
      - lifecycle_network

  airflow-webserver:
    image: apache/airflow:2.10.0-python3.12
    container_name: lifecycle-airflow-webserver
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${SECRET_KEY}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_WWW_USER_USERNAME: ${ADMIN_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${ADMIN_PASS}
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - lifecycle_network

  airflow-scheduler:
    image: apache/airflow:2.10.0-python3.12
    container_name: lifecycle-airflow-scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - lifecycle_network

  airflow-init:
    image: apache/airflow:2.10.0-python3.12
    container_name: lifecycle-airflow-init
    command: version
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - lifecycle_network

networks:
  lifecycle_network:
    driver: bridge

volumes:
  postgres_data: